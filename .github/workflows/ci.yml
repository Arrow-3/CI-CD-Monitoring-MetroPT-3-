name: ci
on:
  pull_request:
  push:
    branches: [main, develop]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with: { python-version: "3.11" }
      - run: uv sync
      - run: uv run ruff check metropt
      - run: uv run pytest -v tests
